services:
  - type: web
    name: s-advanced-attendance-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: SUPERADMIN_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://s-high-adavnced-system.vercel.app  # update if your Vercel URL differs
      # Required for email to work (password resets, etc).
      # Sign up FREE at brevo.com — 300 emails/day, no credit card needed.
      # Get your API key from: Brevo dashboard → your name → SMTP & API → API Keys
      - key: BREVO_API_KEY
        sync: false
      # The email address you'll send FROM — must be verified in your Brevo
      # account first (Brevo dashboard → Senders & IPs → Add a sender).
      # Use your own email address e.g. yourname@gmail.com
      - key: FROM_EMAIL
        sync: false
      # Optional — only needed if you want the "send reset code via Phone"
      # and/or "WhatsApp" options to actually deliver. Without these, both
      # options silently fall back to emailing the code instead (the app
      # keeps working either way). Sign up at dashboard.vonage.com to get
      # your API key and secret. Buy a virtual number there for SMS, and
      # use the Vonage sandbox number for WhatsApp testing.
      - key: VONAGE_API_KEY         # found on your Vonage dashboard homepage
        sync: false
      - key: VONAGE_API_SECRET      # found on your Vonage dashboard homepage
        sync: false
      - key: VONAGE_FROM_NUMBER     # virtual number you buy in Vonage (digits only, no +)
        sync: false
      - key: VONAGE_WHATSAPP_FROM   # WhatsApp sender (Vonage sandbox number for testing)
        sync: false