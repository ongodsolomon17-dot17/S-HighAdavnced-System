services:
  - type: web
    name: s-advanced-attendance-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: SUPERADMIN_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://s-high-adavnced-system.vercel.app  # update if your Vercel URL differs
